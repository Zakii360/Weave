name: Build Executables

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build executables with pkg
        run: |
          npx pkg@5.8.1 src/weave.js \
            --targets node18-win-x64,node18-macos-x64,node18-linux-x64 \
            --output dist/weave \
            --compress GZip

      - name: Rename outputs clearly
        run: |
          mkdir -p release
          mv dist/weave-win.exe  release/weave-windows.exe
          mv dist/weave-macos    release/weave-mac
          mv dist/weave-linux    release/weave-linux
          chmod +x release/weave-mac release/weave-linux

      - name: Upload Windows .exe
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: release/weave-windows.exe
          asset_name: weave-windows.exe
          asset_content_type: application/octet-stream

      - name: Upload macOS binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: release/weave-mac
          asset_name: weave-mac
          asset_content_type: application/octet-stream

      - name: Upload Linux binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: release/weave-linux
          asset_name: weave-linux
          asset_content_type: application/octet-stream
