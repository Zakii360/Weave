name: Build Executables

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build executables with pkg
        run: |
          npx pkg@5.8.1 src/weave.js \
            --targets node18-win-x64,node18-macos-x64,node18-linux-x64 \
            --output dist/weave \
            --compress GZip

      - name: Rename outputs
        run: |
          mkdir -p release
          mv dist/weave-win.exe  release/weave-windows.exe
          mv dist/weave-macos    release/weave-mac
          mv dist/weave-linux    release/weave-linux
          chmod +x release/weave-mac release/weave-linux

      - name: Upload binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            release/weave-windows.exe \
            release/weave-mac \
            release/weave-linux \
            --clobber
